<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess Who?</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    /* Lobby */
    .lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      padding: 20px;
    }

    .lobby h1 {
      font-size: 2.5rem;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .lobby p {
      color: #aaa;
      font-size: 1.1rem;
      max-width: 400px;
      text-align: center;
      line-height: 1.5;
    }

    .lobby-box {
      background: #16213e;
      border: 3px solid #0f3460;
      border-radius: 16px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 380px;
    }

    .lobby-box label {
      font-size: 1rem;
      font-weight: 600;
      color: #aaa;
    }

    .lobby-box input {
      width: 100%;
      padding: 14px;
      border: 2px solid #0f3460;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
      font-size: 1.4rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 6px;
      font-weight: 700;
      outline: none;
    }

    .lobby-box input:focus { border-color: #e94560; }

    .lobby-buttons {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .lobby-buttons button {
      flex: 1;
      padding: 14px;
      font-size: 1rem;
    }

    .status-msg {
      font-size: 0.95rem;
      color: #ff9a3c;
      min-height: 24px;
      text-align: center;
    }

    .status-msg.error { color: #e94560; }

    /* Game area */
    .game-container {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    .game-container.visible { display: flex; }

    header {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 16px 8px;
    }

    h1 {
      font-size: 1.8rem;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .controls { display: flex; gap: 10px; }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
    }

    button:hover { transform: scale(1.05); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-reset { background: #0f3460; color: #eee; }
    .btn-new { background: #e94560; color: #fff; }
    .btn-guess { background: #16c79a; color: #1a1a2e; }
    .btn-create { background: #e94560; color: #fff; }
    .btn-join { background: #16c79a; color: #1a1a2e; }

    .btn-guess.active {
      background: #ff9a3c;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 154, 60, 0.5); }
      50% { box-shadow: 0 0 0 10px rgba(255, 154, 60, 0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #0f3460;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 10px 0;
    }

    /* Status bar */
    .status-bar {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
    }

    .turn-info { font-size: 1rem; font-weight: 600; }
    .turn-info.your-turn { color: #16c79a; }
    .turn-info.their-turn { color: #ff9a3c; }

    .my-card-badge {
      background: #16213e;
      border: 2px solid #e94560;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
    }

    .my-card-badge strong { color: #e94560; }

    .game-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 8px 0 12px;
    }

    .guess-hint {
      font-size: 0.9rem;
      color: #ff9a3c;
      display: none;
    }

    .guess-hint.visible { display: inline; }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      max-width: 900px;
      width: 100%;
      padding: 0 16px 30px;
    }

    .card {
      background: #16213e;
      border: 3px solid #0f3460;
      border-radius: 12px;
      padding: 10px 6px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 160px;
    }

    .card:hover {
      border-color: #e94560;
      transform: translateY(-3px);
    }

    .card .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #0f3460;
      background: #0d1525;
    }

    .card .name {
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .card.eliminated {
      background: #0d1525;
      border-color: #1a1a2e;
      opacity: 0.35;
    }

    .card.eliminated .avatar { filter: grayscale(1); }

    .card.eliminated .name {
      text-decoration: line-through;
      color: #666;
    }

    .card.eliminated:hover {
      opacity: 0.55;
      border-color: #333;
    }

    .guess-mode .card:not(.eliminated):hover {
      border-color: #16c79a;
      box-shadow: 0 0 15px rgba(22, 199, 154, 0.4);
    }

    /* Result overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.visible { display: flex; }

    .modal {
      background: #16213e;
      border: 3px solid #e94560;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    .modal h2 { font-size: 1.8rem; margin-bottom: 12px; }
    .modal p { font-size: 1.1rem; margin-bottom: 24px; color: #aaa; }
    .modal .highlight { color: #16c79a; font-weight: 700; }
    .win h2 { color: #16c79a; }
    .lose h2 { color: #e94560; }

    .room-code-display {
      background: #1a1a2e;
      border: 2px solid #e94560;
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 0.85rem;
      color: #aaa;
    }

    .room-code-display strong {
      color: #e94560;
      letter-spacing: 2px;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
      h1 { font-size: 1.3rem; }
      header { flex-direction: column; gap: 10px; }
      .card { min-height: 120px; padding: 8px 4px; }
      .card .avatar { width: 56px; height: 56px; }
      .card .name { font-size: 0.7rem; }
      .status-bar { flex-direction: column; gap: 6px; }
    }

    @media (max-width: 400px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

  <!-- Lobby -->
  <div class="lobby" id="lobby">
    <h1>Guess Who?</h1>
    <p>Play with a friend online or start a solo board to coordinate over Discord!</p>

    <div class="lobby-box">
      <label>Solo / Discord Mode</label>
      <button class="btn-join" onclick="startOffline()" style="width:100%;padding:14px;font-size:1.05rem;">Play Offline</button>
      <div style="color:#666;font-size:0.8rem;text-align:center;">Get your own board and card. Tell your friend when you're done over Discord!</div>
    </div>

    <div style="color:#444;font-size:0.9rem;margin:4px 0;">— or play connected —</div>

    <div class="lobby-box">
      <label>Online Room Code</label>
      <input type="text" id="roomCode" maxlength="8" placeholder="e.g. ABCD" autocomplete="off">
      <div class="lobby-buttons">
        <button class="btn-create" onclick="createRoom()">Create Room</button>
        <button class="btn-join" onclick="joinRoom()">Join Room</button>
      </div>
    </div>
    <div class="status-msg" id="lobbyStatus"></div>
  </div>

  <!-- Game -->
  <div class="game-container" id="gameContainer">
    <header>
      <h1>Guess Who?</h1>
      <div class="controls">
        <span class="room-code-display" id="roomBadge"></span>
        <button class="btn-reset" onclick="resetBoard()">Reset Board</button>
      </div>
    </header>

    <div class="status-bar">
      <div class="turn-info" id="turnInfo"></div>
      <div class="my-card-badge" id="myCardBadge"></div>
    </div>

    <div class="game-actions">
      <button class="btn-guess" id="guessBtn" onclick="toggleGuessMode()">Make Guess</button>
      <button class="btn-reset" id="endTurnBtn" onclick="endTurn()" style="background:#ff9a3c;color:#1a1a2e;">End Turn</button>
      <span class="guess-hint" id="guessHint">Click a character to guess!</span>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <!-- Result modal -->
  <div class="overlay" id="overlay">
    <div class="modal" id="modal">
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
      <button class="btn-new" onclick="location.reload()">Back to Lobby</button>
    </div>
  </div>

  <script>
    // 100 celebrities — each game picks 24 at random
    const ALL_CHARACTERS = [
      "Taylor Swift", "Dwayne Johnson", "Zendaya", "Ryan Reynolds",
      "Beyoncé", "Tom Holland", "Billie Eilish", "Chris Hemsworth",
      "Selena Gomez", "Keanu Reeves", "Ariana Grande", "Timothée Chalamet",
      "Jennifer Lawrence", "Leonardo DiCaprio", "Rihanna", "Will Smith",
      "Scarlett Johansson", "Robert Downey Jr.", "Emma Watson", "Chris Pratt",
      "Kylie Jenner", "Drake", "Margot Robbie", "Pedro Pascal",
      "Bad Bunny", "Harry Styles", "Dua Lipa", "Morgan Freeman",
      "Cardi B", "Tom Hanks", "Gal Gadot", "Post Malone",
      "Lady Gaga", "Brad Pitt", "Shakira", "Denzel Washington",
      "Adele", "Jason Momoa", "Miley Cyrus", "Samuel L. Jackson",
      "Nicki Minaj", "Ryan Gosling", "SZA", "Johnny Depp",
      "Olivia Rodrigo", "Chris Evans", "Megan Thee Stallion", "Vin Diesel",
      "Lizzo", "Tom Cruise", "Hailey Bieber", "Jeff Bezos",
      "Kendall Jenner", "Elon Musk", "Ice Spice", "Mark Zuckerberg",
      "Sabrina Carpenter", "LeBron James", "Karol G", "Lionel Messi",
      "Lana Del Rey", "Cristiano Ronaldo", "Dove Cameron", "Serena Williams",
      "Chappell Roan", "Stephen Curry", "Sydney Sweeney", "Travis Kelce",
      "Rosalía", "Patrick Mahomes", "Florence Pugh", "Shohei Ohtani",
      "Tyla", "Usain Bolt", "Ana de Armas", "Kevin Hart",
      "Charli XCX", "The Weeknd", "Jenna Ortega", "Snoop Dogg",
      "Billie Holiday", "Travis Scott", "Millie Bobby Brown", "Jack Black",
      "Anya Taylor-Joy", "J. Cole", "Hailee Steinfeld", "Adam Sandler",
      "Madison Beer", "21 Savage", "Rachel Zegler", "Danny DeVito",
      "Camila Cabello", "Tyler, the Creator", "Lupita Nyong'o", "Oprah Winfrey",
      "Lil Nas X", "Reese Witherspoon", "Bruno Mars", "Awkwafina"
    ];

    // Wikipedia article titles for image lookups
    const WIKI_TITLES = {
      "Taylor Swift": "Taylor_Swift", "Dwayne Johnson": "Dwayne_Johnson",
      "Zendaya": "Zendaya", "Ryan Reynolds": "Ryan_Reynolds",
      "Beyoncé": "Beyoncé", "Tom Holland": "Tom_Holland",
      "Billie Eilish": "Billie_Eilish", "Chris Hemsworth": "Chris_Hemsworth",
      "Selena Gomez": "Selena_Gomez", "Keanu Reeves": "Keanu_Reeves",
      "Ariana Grande": "Ariana_Grande", "Timothée Chalamet": "Timothée_Chalamet",
      "Jennifer Lawrence": "Jennifer_Lawrence", "Leonardo DiCaprio": "Leonardo_DiCaprio",
      "Rihanna": "Rihanna", "Will Smith": "Will_Smith",
      "Scarlett Johansson": "Scarlett_Johansson", "Robert Downey Jr.": "Robert_Downey_Jr.",
      "Emma Watson": "Emma_Watson", "Chris Pratt": "Chris_Pratt",
      "Kylie Jenner": "Kylie_Jenner", "Drake": "Drake_(musician)",
      "Margot Robbie": "Margot_Robbie", "Pedro Pascal": "Pedro_Pascal",
      "Bad Bunny": "Bad_Bunny", "Harry Styles": "Harry_Styles",
      "Dua Lipa": "Dua_Lipa", "Morgan Freeman": "Morgan_Freeman",
      "Cardi B": "Cardi_B", "Tom Hanks": "Tom_Hanks",
      "Gal Gadot": "Gal_Gadot", "Post Malone": "Post_Malone",
      "Lady Gaga": "Lady_Gaga", "Brad Pitt": "Brad_Pitt",
      "Shakira": "Shakira_(singer)", "Denzel Washington": "Denzel_Washington",
      "Adele": "Adele_(singer)", "Jason Momoa": "Jason_Momoa",
      "Miley Cyrus": "Miley_Cyrus", "Samuel L. Jackson": "Samuel_L._Jackson",
      "Nicki Minaj": "Nicki_Minaj", "Ryan Gosling": "Ryan_Gosling",
      "SZA": "SZA_(singer)", "Johnny Depp": "Johnny_Depp",
      "Olivia Rodrigo": "Olivia_Rodrigo", "Chris Evans": "Chris_Evans_(actor)",
      "Megan Thee Stallion": "Megan_Thee_Stallion", "Vin Diesel": "Vin_Diesel",
      "Lizzo": "Lizzo_(singer)", "Tom Cruise": "Tom_Cruise",
      "Hailey Bieber": "Hailey_Bieber", "Jeff Bezos": "Jeff_Bezos",
      "Kendall Jenner": "Kendall_Jenner", "Elon Musk": "Elon_Musk",
      "Ice Spice": "Ice_Spice", "Mark Zuckerberg": "Mark_Zuckerberg",
      "Sabrina Carpenter": "Sabrina_Carpenter", "LeBron James": "LeBron_James",
      "Karol G": "Karol_G", "Lionel Messi": "Lionel_Messi",
      "Lana Del Rey": "Lana_Del_Rey", "Cristiano Ronaldo": "Cristiano_Ronaldo",
      "Dove Cameron": "Dove_Cameron", "Serena Williams": "Serena_Williams",
      "Chappell Roan": "Chappell_Roan", "Stephen Curry": "Stephen_Curry",
      "Sydney Sweeney": "Sydney_Sweeney", "Travis Kelce": "Travis_Kelce",
      "Rosalía": "Rosalía_(singer)", "Patrick Mahomes": "Patrick_Mahomes",
      "Florence Pugh": "Florence_Pugh", "Shohei Ohtani": "Shohei_Ohtani",
      "Tyla": "Tyla_(singer)", "Usain Bolt": "Usain_Bolt",
      "Ana de Armas": "Ana_de_Armas", "Kevin Hart": "Kevin_Hart",
      "Charli XCX": "Charli_XCX", "The Weeknd": "The_Weeknd",
      "Jenna Ortega": "Jenna_Ortega", "Snoop Dogg": "Snoop_Dogg",
      "Billie Holiday": "Billie_Holiday", "Travis Scott": "Travis_Scott",
      "Millie Bobby Brown": "Millie_Bobby_Brown", "Jack Black": "Jack_Black",
      "Anya Taylor-Joy": "Anya_Taylor-Joy", "J. Cole": "J._Cole",
      "Hailee Steinfeld": "Hailee_Steinfeld", "Adam Sandler": "Adam_Sandler",
      "Madison Beer": "Madison_Beer", "21 Savage": "21_Savage",
      "Rachel Zegler": "Rachel_Zegler", "Danny DeVito": "Danny_DeVito",
      "Camila Cabello": "Camila_Cabello", "Tyler, the Creator": "Tyler,_the_Creator",
      "Lupita Nyong'o": "Lupita_Nyong%27o", "Oprah Winfrey": "Oprah_Winfrey",
      "Lil Nas X": "Lil_Nas_X", "Reese Witherspoon": "Reese_Witherspoon",
      "Bruno Mars": "Bruno_Mars", "Awkwafina": "Awkwafina"
    };

    // The 24 characters chosen for this game (set by host, sent to guest)
    let gameCharacters = [];

    const imageCache = {};

    async function fetchImages() {
      const names = gameCharacters.length ? gameCharacters : [];
      if (!names.length) return;

      // Encode each title individually but keep | as separator (Wikipedia API requirement)
      const wikiTitles = names.map(n => WIKI_TITLES[n]).filter(Boolean);
      const titlesParam = wikiTitles.map(t => encodeURIComponent(t.replace(/_/g, " "))).join("|");
      const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${titlesParam}&prop=pageimages&pithumbsize=200&format=json&origin=*&redirects=1`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        const pages = data.query.pages;
        // Build lookup from page title to thumbnail
        const titleToThumb = {};
        for (const id in pages) {
          const page = pages[id];
          if (page.thumbnail) titleToThumb[page.title.toLowerCase()] = page.thumbnail.source;
        }
        // Handle redirects (e.g. "Adele" → "Adele (singer)")
        if (data.query.redirects) {
          for (const r of data.query.redirects) {
            const target = r.to.toLowerCase();
            if (titleToThumb[target]) {
              titleToThumb[r.from.toLowerCase()] = titleToThumb[target];
            }
          }
        }
        // Map display names to image URLs
        for (const name of names) {
          const wikiTitle = WIKI_TITLES[name];
          if (!wikiTitle) continue;
          const normalized = wikiTitle.replace(/_/g, " ").replace(/%27/g, "'").toLowerCase();
          if (titleToThumb[normalized]) imageCache[name] = titleToThumb[normalized];
        }
        // Update rendered cards
        document.querySelectorAll(".card .avatar").forEach(img => {
          const name = img.closest(".card").dataset.name;
          if (imageCache[name]) img.src = imageCache[name];
        });
      } catch (e) {
        console.warn("Could not fetch Wikipedia images:", e);
      }
    }

    // ─── Network config ───
    // TURN servers needed for cross-network play (different WiFi, states, etc.)
    const ICE_CONFIG = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
        { urls: "stun:stun2.l.google.com:19302" },
        { urls: "stun:stun3.l.google.com:19302" },
        {
          urls: "turn:openrelay.metered.ca:80",
          username: "openrelayproject",
          credential: "openrelayproject"
        },
        {
          urls: "turn:openrelay.metered.ca:443",
          username: "openrelayproject",
          credential: "openrelayproject"
        },
        {
          urls: "turn:openrelay.metered.ca:443?transport=tcp",
          username: "openrelayproject",
          credential: "openrelayproject"
        }
      ]
    };
    const PEER_OPTS = { config: ICE_CONFIG };
    const PEER_PREFIX = "guesswho-game-";
    let peer = null;
    let conn = null;
    let isHost = false;
    let offlineMode = false;
    let myCard = "";
    let roomId = "";
    let eliminated = new Set();
    let guessMode = false;
    let gameOver = false;
    let myTurn = false;

    function setLobbyStatus(msg, isError) {
      const el = document.getElementById("lobbyStatus");
      el.textContent = msg;
      el.className = isError ? "status-msg error" : "status-msg";
    }

    function getRoomCode() {
      return document.getElementById("roomCode").value.trim().toUpperCase();
    }

    // ─── Offline / Discord Mode ───
    function startOffline() {
      offlineMode = true;
      myTurn = true;
      const shuffled = [...ALL_CHARACTERS].sort(() => Math.random() - 0.5);
      gameCharacters = shuffled.slice(0, 24);
      myCard = gameCharacters[Math.floor(Math.random() * gameCharacters.length)];
      document.getElementById("lobby").style.display = "none";
      document.getElementById("gameContainer").classList.add("visible");
      document.getElementById("roomBadge").innerHTML = "<strong>Offline</strong>";
      document.getElementById("endTurnBtn").style.display = "none";
      renderBoard();
      updateTurnUI();
      fetchImages();
    }

    // ─── Create Room (Host) ───
    function createRoom() {
      const code = getRoomCode();
      if (!code) { setLobbyStatus("Enter a room code first!", true); return; }
      roomId = code;
      isHost = true;
      setLobbyStatus("Creating room...");

      peer = new Peer(PEER_PREFIX + code, PEER_OPTS);

      peer.on("open", () => {
        setLobbyStatus(`Room "${code}" created! Waiting for opponent to join...`);
      });

      peer.on("connection", (connection) => {
        conn = connection;
        setupConnection();
        // Host picks 24 random characters for the board
        const shuffled = [...ALL_CHARACTERS].sort(() => Math.random() - 0.5);
        gameCharacters = shuffled.slice(0, 24);
        // Pick 2 different mystery cards from those 24
        const cardShuffled = [...gameCharacters].sort(() => Math.random() - 0.5);
        myCard = cardShuffled[0];     // host's card (guest tries to guess this)
        const guestCard = cardShuffled[1]; // guest's card (host tries to guess this)
        conn.on("open", () => {
          conn.send({ type: "start", yourCard: guestCard, characters: gameCharacters });
          myTurn = true; // host goes first
          startGame();
        });
      });

      peer.on("error", (err) => {
        if (err.type === "unavailable-id") {
          setLobbyStatus(`Room "${code}" already exists. Try joining it instead!`, true);
        } else {
          setLobbyStatus("Connection error: " + err.message, true);
        }
        console.error(err);
      });
    }

    // ─── Join Room (Guest) ───
    function joinRoom() {
      const code = getRoomCode();
      if (!code) { setLobbyStatus("Enter a room code first!", true); return; }
      roomId = code;
      isHost = false;
      setLobbyStatus("Connecting to room...");

      peer = new Peer(PEER_OPTS);

      peer.on("open", () => {
        conn = peer.connect(PEER_PREFIX + code, { reliable: true });

        conn.on("open", () => {
          setLobbyStatus("Connected! Waiting for game to start...");
          setupConnection();
        });

        conn.on("error", (err) => {
          setLobbyStatus("Could not connect: " + err.message, true);
        });
      });

      peer.on("error", (err) => {
        if (err.type === "peer-unavailable") {
          setLobbyStatus(`Room "${code}" not found. Ask your friend to create it first!`, true);
        } else {
          setLobbyStatus("Connection error: " + err.message, true);
        }
        console.error(err);
      });
    }

    // ─── Connection message handling ───
    function setupConnection() {
      conn.on("data", (data) => {
        switch (data.type) {
          case "start":
            // Guest receives their card and the 24 characters for this game
            myCard = data.yourCard;
            gameCharacters = data.characters;
            myTurn = false; // host goes first
            startGame();
            break;

          case "guess":
            // Opponent is guessing my card
            const correct = data.name === myCard;
            conn.send({ type: "guessResult", correct, actualCard: myCard, guessedName: data.name });
            if (correct) {
              // I lost - opponent guessed my card
              showResult(false, data.name, myCard);
            } else {
              // Opponent guessed wrong, they lose
              showResult(true, data.name, myCard);
            }
            break;

          case "guessResult":
            // I get the result of my guess
            if (data.correct) {
              showResult(true, data.guessedName, data.actualCard);
            } else {
              showResult(false, data.guessedName, data.actualCard);
            }
            break;

          case "endTurn":
            myTurn = true;
            updateTurnUI();
            break;

          case "disconnect":
            if (!gameOver) {
              setLobbyStatus("Opponent disconnected!", true);
            }
            break;
        }
      });

      conn.on("close", () => {
        if (!gameOver) {
          showDisconnect();
        }
      });
    }

    // ─── Game UI ───
    function startGame() {
      document.getElementById("lobby").style.display = "none";
      document.getElementById("gameContainer").classList.add("visible");
      document.getElementById("roomBadge").innerHTML = `Room: <strong>${roomId}</strong>`;
      renderBoard();
      updateTurnUI();
      fetchImages();
    }

    function updateTurnUI() {
      const info = document.getElementById("turnInfo");
      if (offlineMode) {
        info.textContent = "Eliminate characters, then Make Guess when ready!";
        info.className = "turn-info your-turn";
        document.getElementById("guessBtn").disabled = false;
        return;
      }
      if (myTurn) {
        info.textContent = "Your Turn — eliminate characters or make a guess!";
        info.className = "turn-info your-turn";
      } else {
        info.textContent = "Opponent's Turn — waiting...";
        info.className = "turn-info their-turn";
      }
      document.getElementById("guessBtn").disabled = !myTurn;
      document.getElementById("endTurnBtn").disabled = !myTurn;

      // Exit guess mode if not my turn
      if (!myTurn && guessMode) {
        guessMode = false;
        document.getElementById("guessBtn").classList.remove("active");
        document.getElementById("guessHint").classList.remove("visible");
        document.getElementById("grid").classList.remove("guess-mode");
      }
    }

    function renderBoard() {
      const badge = document.getElementById("myCardBadge");
      badge.innerHTML = `Your card: <strong>${myCard}</strong>`;

      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      gameCharacters.forEach(name => {
        const card = document.createElement("div");
        card.className = "card" + (eliminated.has(name) ? " eliminated" : "");
        const imgSrc = imageCache[name] || "";
        card.innerHTML = `<img class="avatar" src="${imgSrc}" alt="${name}" onerror="this.style.display='none'"><span class="name">${name}</span>`;
        card.dataset.name = name;
        card.addEventListener("click", () => handleCardClick(card));
        grid.appendChild(card);
      });

      guessMode = false;
      document.getElementById("guessBtn").classList.remove("active");
      document.getElementById("guessHint").classList.remove("visible");
      grid.classList.remove("guess-mode");
    }

    function handleCardClick(card) {
      if (gameOver) return;
      const name = card.dataset.name;

      if (guessMode) {
        if (!myTurn) return;
        if (card.classList.contains("eliminated")) return;
        makeGuess(name);
        return;
      }

      // Eliminate/restore (allowed any time, it's your own board)
      if (eliminated.has(name)) {
        eliminated.delete(name);
        card.classList.remove("eliminated");
      } else {
        eliminated.add(name);
        card.classList.add("eliminated");
      }
    }

    function toggleGuessMode() {
      if (gameOver || (!myTurn && !offlineMode)) return;
      guessMode = !guessMode;
      document.getElementById("guessBtn").classList.toggle("active", guessMode);
      document.getElementById("guessHint").classList.toggle("visible", guessMode);
      document.getElementById("grid").classList.toggle("guess-mode", guessMode);
    }

    function makeGuess(name) {
      gameOver = true;
      guessMode = false;
      document.getElementById("guessBtn").classList.remove("active");
      document.getElementById("guessHint").classList.remove("visible");
      document.getElementById("grid").classList.remove("guess-mode");

      if (offlineMode) {
        // Offline: show the guess and let the player ask their friend
        const modal = document.getElementById("modal");
        const title = document.getElementById("modalTitle");
        const text = document.getElementById("modalText");
        modal.className = "modal win";
        title.textContent = "Your Guess";
        text.innerHTML = `You guessed <span class="highlight">${name}</span>!<br><br><span style="color:#aaa;font-size:0.9rem;">Ask your opponent if you're right!</span>`;
        document.getElementById("overlay").classList.add("visible");
        return;
      }

      // Online: send guess to opponent — they validate against their card
      conn.send({ type: "guess", name });

      // Show waiting state
      const info = document.getElementById("turnInfo");
      info.textContent = "Waiting for result...";
      info.className = "turn-info their-turn";
    }

    function showResult(iWon, guessedName, actualCard) {
      gameOver = true;
      const modal = document.getElementById("modal");
      const title = document.getElementById("modalTitle");
      const text = document.getElementById("modalText");

      if (iWon) {
        modal.className = "modal win";
        title.textContent = "You Win!";
        text.innerHTML = `The mystery person was <span class="highlight">${actualCard}</span>.`;
      } else {
        modal.className = "modal lose";
        title.textContent = "You Lose!";
        text.innerHTML = `Guessed <strong>${guessedName}</strong>, but the answer was <span class="highlight">${actualCard}</span>.`;
      }

      document.getElementById("overlay").classList.add("visible");
    }

    function showDisconnect() {
      gameOver = true;
      const modal = document.getElementById("modal");
      const title = document.getElementById("modalTitle");
      const text = document.getElementById("modalText");
      modal.className = "modal lose";
      title.textContent = "Disconnected";
      text.textContent = "Your opponent left the game.";
      document.getElementById("overlay").classList.add("visible");
    }

    function endTurn() {
      if (gameOver || !myTurn) return;
      myTurn = false;
      conn.send({ type: "endTurn" });
      updateTurnUI();
    }

    function resetBoard() {
      if (gameOver) return;
      eliminated.clear();
      renderBoard();
      updateTurnUI();
    }

    // Allow pressing Enter in room code input
    document.getElementById("roomCode").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        // If room exists, join; otherwise create
        joinRoom();
      }
    });

    // Images are fetched when the game starts (after characters are selected)
  </script>
</body>
</html>
