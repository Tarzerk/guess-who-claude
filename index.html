<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess Who?</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Main Menu -->
  <div class="lobby-screen" id="mainMenu">
    <h1 class="lobby-title">Guess Who?</h1>
    <div class="main-menu">
      <button class="mode-btn" onclick="showScreen('soloSetup')">
        <span class="mode-btn-title">Solo Board</span>
        <span class="mode-btn-desc">Get your own board and coordinate over voice chat</span>
      </button>
      <button class="mode-btn" onclick="showScreen('localSetup')">
        <span class="mode-btn-title">Pass &amp; Play</span>
        <span class="mode-btn-desc">Pass &amp; play with a friend on one device</span>
      </button>
      <button class="mode-btn" onclick="showScreen('onlineSetup')">
        <span class="mode-btn-title">Online</span>
        <span class="mode-btn-desc">Create or join a room to play remotely</span>
      </button>
    </div>
  </div>

  <!-- Solo Setup -->
  <div class="lobby-screen" id="soloSetup" style="display:none">
    <button class="back-btn" onclick="showScreen('mainMenu')">&larr; Back</button>
    <h1 class="lobby-title">Solo Board</h1>
    <div class="lobby-box">
      <label>Character Pack</label>
      <select id="soloPackSelect"></select>
      <div class="pack-label">Pick the same pack as your friend so you both have the same board!</div>
      <button class="btn-join" onclick="startOffline()" style="width:100%;padding:14px;font-size:1.05rem;">Play</button>
    </div>
  </div>

  <!-- Local Multiplayer Setup -->
  <div class="lobby-screen" id="localSetup" style="display:none">
    <button class="back-btn" onclick="showScreen('mainMenu')">&larr; Back</button>
    <h1 class="lobby-title">Pass &amp; Play</h1>
    <div class="lobby-box">
      <label>Character Pack</label>
      <select id="localPackSelect"></select>
      <button class="btn-join" onclick="startLocalMultiplayer()" style="width:100%;padding:14px;font-size:1.05rem;">Start Game</button>
    </div>
  </div>

  <!-- Online Setup -->
  <div class="lobby-screen" id="onlineSetup" style="display:none">
    <button class="back-btn" onclick="showScreen('mainMenu')">&larr; Back</button>
    <h1 class="lobby-title">Online</h1>
    <div class="lobby-box">
      <label>Room Code</label>
      <input type="text" id="roomCode" maxlength="8" placeholder="e.g. ABCD" autocomplete="off">
      <div class="lobby-buttons">
        <button class="btn-create" onclick="createRoom()">Create Room</button>
        <button class="btn-join" onclick="joinRoom()">Join Room</button>
      </div>
    </div>
    <div class="status-msg" id="lobbyStatus"></div>
  </div>

  <!-- Game -->
  <div class="game-container" id="gameContainer">
    <header>
      <h1>Guess Who?</h1>
      <div class="controls">
        <span class="room-code-display" id="roomBadge"></span>
        <button class="btn-reset" onclick="resetBoard()">Reset Board</button>
      </div>
    </header>

    <div class="status-bar">
      <div class="turn-info" id="turnInfo"></div>
      <div class="my-card-badge" id="myCardBadge"></div>
    </div>

    <div class="game-actions">
      <button class="btn-guess" id="guessBtn" onclick="toggleGuessMode()">Make Guess</button>
      <button class="btn-reset" id="endTurnBtn" onclick="endTurn()" style="background:#ff9a3c;color:#1a1a2e;">End Turn</button>
      <span class="guess-hint" id="guessHint">Click a character to guess!</span>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <!-- Result modal -->
  <div class="overlay" id="overlay">
    <div class="modal" id="modal">
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
      <button class="btn-new" onclick="location.reload()">Back to Lobby</button>
    </div>
  </div>

  <!-- Pass overlay (local multiplayer) -->
  <div class="overlay" id="passOverlay">
    <div class="modal pass-modal">
      <h2 id="passTitle"></h2>
      <p id="passText"></p>
      <button class="btn-new" id="passBtn" onclick="handlePassAction()">Continue</button>
    </div>
  </div>

  <script src="characters.js"></script>
  <script src="network.js"></script>
  <script src="game.js"></script>
  <script>
    // Populate pack selectors
    function populatePackSelect(selectId) {
      const sel = document.getElementById(selectId);
      PACK_NAMES.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name + " (" + CHARACTER_PACKS[name].length + ")";
        sel.appendChild(opt);
      });
    }
    populatePackSelect("soloPackSelect");
    populatePackSelect("localPackSelect");
  </script>
</body>
</html>
